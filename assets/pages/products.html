<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/products.css">

    <link rel="shortcut icon" href="/assets/images/logo.png" type="image/x-icon">

    <title>Products</title>
</head>
<body>
    <main>
        <div class="app">
            <header>
                <a href="../../index.html" class="title">Suite Store</a>

                <nav>
                    <a href="../../index.html">Home</a>
                    <a href="#">Products</a>
                    <a href="../pages/category.html">Categories</a>
                    <a href="../pages/history.html">History</a>
                </nav>
            </header>
            
            <section class="content">
                <form id="new-product-form">
                    <div class="product">
                        <input type="text" id="product-name" placeholder="Product name:" required/>
    
                        <input type="text" id="amount" placeholder="Amount:"/>
                        
                        <input type="text" id="unit-price" placeholder="Unit price:" disabled/>
    
                        <select id="category">
                            <option value="">Food</option>
                            <option value="">Eletro</option>
                            <option value="">Drink</option>
                        </select>
                        
                        <button id="product-button">Add New Product</button>
                    </div>            
                </form>

                <div class="line"></div>
    
                <div class="products-table">
                    <table>
                        <tr>
                            <th id="th-code">Code</th>
                            <th>Product</th>
                            <th>Amount</th>
                            <th>Unit price</th>
                            <th>Category</th>
                        </tr>
        
                        <tr>
                            <td id="first-td">001</td>
                            <td>Rice</td>
                            <td>10</td>
                            <td>20.00</td>
                            <td>Food</td>
                            <td id="last-td">
                                <button id="td-button">Delete</button>
                            </td>
                        </tr>
        
                        <tr>
                            <td id="first-td">002</td>
                            <td>Beans</td>
                            <td>1</td>
                            <td>9.00</td>
                            <td>Food</td>
                            <td id="last-td">
                                <button id="td-button">Delete</button>
                            </td>
                        </tr>

                        <!-- teste de coluna vazia-->
                        <tr>
                            <td id="first-empty-td"></td>
                            <td id="empty-td"></td>
                            <td id="empty-td"></td>
                            <td id="empty-td"></td>
                            <td id="last-empty-td">
                                <button id="last-td-button"></button>
                            </td>
                        </tr>
                    </table> 
                </div> 
            </section>

            <footer>
                <p class="rights">© 2024 SoftExpert. All rights reserved.</p>
            </footer>
        </div>
    </main>
</body>
</html>
